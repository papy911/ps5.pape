<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - PlaySphere</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#121212; color:#fff; font-family:'Segoe UI',Roboto,sans-serif; display:flex; height:100vh; overflow:hidden; }
        .sp-sidebar { width:280px; background:#000; padding:20px; display:flex; flex-direction:column; gap:8px; flex-shrink:0; }
        .sp-logo { font-size:1.4rem; font-weight:800; color:#1db954; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .sp-menu-item { display:flex; align-items:center; gap:14px; padding:10px 12px; border-radius:8px; cursor:pointer; font-size:0.9rem; color:rgba(255,255,255,0.7); transition:0.2s; font-weight:500; }
        .sp-menu-item:hover { color:white; }
        .sp-menu-item.active { color:white; font-weight:700; }
        .sp-menu-item .ico { font-size:1.2rem; width:24px; text-align:center; }
        .sp-divider { height:1px; background:rgba(255,255,255,0.1); margin:12px 0; }
        .sp-playlist { font-size:0.8rem; color:rgba(255,255,255,0.5); padding:6px 12px; cursor:pointer; transition:0.2s; border-radius:4px; }
        .sp-playlist:hover { color:white; background:rgba(255,255,255,0.05); }
        .sp-main { flex:1; overflow-y:auto; background:linear-gradient(180deg,#1a3a2a 0%,#121212 300px); }
        .sp-header { padding:20px 30px; display:flex; align-items:center; justify-content:space-between; }
        .sp-nav-btns { display:flex; gap:8px; }
        .sp-nav-btn { width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.7); border:none; color:white; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .sp-user-btn { display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.7); padding:4px 10px 4px 4px; border-radius:20px; cursor:pointer; font-size:0.8rem; font-weight:700; }
        .sp-user-avatar { width:28px; height:28px; border-radius:50%; background:#1db954; display:flex; align-items:center; justify-content:center; font-size:0.7rem; }
        .sp-content { padding:0 30px 100px; }
        .sp-greeting { font-size:1.8rem; font-weight:800; margin-bottom:20px; }
        .sp-quick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:30px; }
        .sp-quick { display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.08); border-radius:6px; overflow:hidden; cursor:pointer; transition:0.2s; height:54px; }
        .sp-quick:hover { background:rgba(255,255,255,0.15); }
        .sp-quick img,.sp-quick .sq-img { width:54px; height:54px; object-fit:cover; background-size:cover; background-position:center; flex-shrink:0; }
        .sp-quick span { font-size:0.85rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sp-section h2 { font-size:1.3rem; font-weight:700; margin-bottom:15px; }
        .sp-section { margin-bottom:30px; }
        .sp-row { display:flex; gap:16px; overflow-x:auto; scrollbar-width:none; }
        .sp-row::-webkit-scrollbar { display:none; }
        .sp-card { flex-shrink:0; width:175px; background:rgba(255,255,255,0.05); border-radius:8px; padding:14px; cursor:pointer; transition:0.3s; }
        .sp-card:hover { background:rgba(255,255,255,0.1); transform:translateY(-3px); }
        .sp-card-img { width:100%; aspect-ratio:1; border-radius:6px; background-size:cover; background-position:center; margin-bottom:12px; box-shadow:0 8px 20px rgba(0,0,0,0.5); }
        .sp-card h4 { font-size:0.85rem; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .sp-card p { font-size:0.72rem; color:rgba(255,255,255,0.5); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        /* Player Bar */
        .sp-player { position:fixed; bottom:0; left:0; right:0; height:80px; background:#181818; border-top:1px solid rgba(255,255,255,0.05); display:flex; align-items:center; padding:0 20px; z-index:20; }
        .sp-now { display:flex; align-items:center; gap:12px; flex:1; }
        .sp-now-img { width:56px; height:56px; border-radius:4px; background-size:cover; background-position:center; }
        .sp-now-info h5 { font-size:0.85rem; margin-bottom:2px; }
        .sp-now-info p { font-size:0.7rem; color:rgba(255,255,255,0.5); }
        .sp-controls { flex:2; display:flex; flex-direction:column; align-items:center; gap:6px; }
        .sp-ctrl-btns { display:flex; align-items:center; gap:18px; }
        .sp-ctrl-btn { background:none; border:none; color:rgba(255,255,255,0.7); font-size:1rem; cursor:pointer; transition:0.2s; }
        .sp-ctrl-btn:hover { color:white; }
        .sp-ctrl-btn.main-play { background:#fff; color:#000; width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1rem; }
        .sp-ctrl-btn.main-play:hover { transform:scale(1.05); }
        .sp-progress { display:flex; align-items:center; gap:8px; width:100%; max-width:500px; }
        .sp-progress span { font-size:0.65rem; color:rgba(255,255,255,0.5); min-width:35px; text-align:center; }
        .sp-prog-bar { flex:1; height:4px; background:rgba(255,255,255,0.2); border-radius:4px; cursor:pointer; position:relative; }
        .sp-prog-fill { height:100%; background:#1db954; border-radius:4px; width:35%; transition:width 0.3s; }
        .sp-prog-bar:hover .sp-prog-fill { background:#1ed760; }
        .sp-extra { flex:1; display:flex; justify-content:flex-end; align-items:center; gap:14px; }
        .sp-vol { display:flex; align-items:center; gap:6px; }
        .sp-vol-bar { width:80px; height:4px; background:rgba(255,255,255,0.2); border-radius:4px; cursor:pointer; }
        .sp-vol-fill { width:65%; height:100%; background:rgba(255,255,255,0.7); border-radius:4px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sp-sidebar { width: 100%; padding: 15px; flex-direction: row; flex-wrap: wrap; justify-content: center; height: auto; }
            .sp-playlist { display: none; } /* Hide playlists on mobile sidebar */
            .sp-divider { display: none; }
            .sp-content { padding: 0 15px 120px; }
            .sp-quick-grid { grid-template-columns: 1fr; }
            .sp-player { flex-direction: column; height: 130px; padding: 10px; justify-content: center; gap: 10px; }
            .sp-now { width: 100%; justify-content: center; }
            .sp-extra { display: none; } /* Hide volume controls on mobile */
            .sp-controls { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="sp-sidebar">
        <div class="sp-logo">🎵 Spotify</div>
        <div class="sp-menu-item active"><span class="ico">🏠</span> Accueil</div>
        <div class="sp-menu-item"><span class="ico">🔍</span> Recherche</div>
        <div class="sp-menu-item"><span class="ico">📚</span> Bibliothèque</div>
        <div class="sp-divider"></div>
        <div class="sp-menu-item"><span class="ico">➕</span> Créer playlist</div>
        <div class="sp-menu-item"><span class="ico">💜</span> Titres likés</div>
        <div class="sp-divider"></div>
        <div class="sp-playlist">🎵 Gaming Vibes</div>
        <div class="sp-playlist">🎵 Chill Lo-Fi</div>
        <div class="sp-playlist">🎵 Workout Mix</div>
        <div class="sp-playlist">🎵 Road Trip</div>
        <div class="sp-playlist">🎵 Concentration</div>
        <div class="sp-playlist">🎵 French Rap</div>
    </div>
    <div class="sp-main">
        <div class="sp-header">
            <div class="sp-nav-btns"><button class="sp-nav-btn">◀</button><button class="sp-nav-btn">▶</button></div>
            <div class="sp-user-btn"><div class="sp-user-avatar">J</div> Joueur</div>
        </div>
        <div class="sp-content">
            <div class="sp-greeting" id="greeting">Bonsoir</div>
            <div class="sp-quick-grid" id="quick-grid"></div>
            <div class="sp-section"><h2>Fait pour vous</h2><div class="sp-row" id="r1"></div></div>
            <div class="sp-section"><h2>Récemment écouté</h2><div class="sp-row" id="r2"></div></div>
            <div class="sp-section"><h2>Playlists populaires</h2><div class="sp-row" id="r3"></div></div>
        </div>
    </div>
    <div class="sp-player">
        <div class="sp-now">
            <div class="sp-now-img" id="now-img" style="background-image:url('../../assets/images/media_43.jpg')"></div>
            <div class="sp-now-info"><h5 id="now-title">Chill Vibes</h5><p id="now-artist">LoFi Beats</p></div>
            <span style="cursor:pointer;margin-left:8px;opacity:0.6" id="like-btn" onclick="this.textContent=this.textContent==='🤍'?'💚':'🤍'">🤍</span>
        </div>
        <div class="sp-controls">
            <div class="sp-ctrl-btns">
                <button class="sp-ctrl-btn">🔀</button>
                <button class="sp-ctrl-btn">⏮</button>
                <button class="sp-ctrl-btn main-play" id="play-btn" onclick="togglePlay()">▶</button>
                <button class="sp-ctrl-btn">⏭</button>
                <button class="sp-ctrl-btn">🔁</button>
            </div>
            <div class="sp-progress"><span>1:24</span><div class="sp-prog-bar"><div class="sp-prog-fill" id="prog-fill"></div></div><span>3:45</span></div>
        </div>
        <div class="sp-extra">
            <span style="cursor:pointer;font-size:0.9rem;opacity:0.6">🎤</span>
            <span style="cursor:pointer;font-size:0.9rem;opacity:0.6">📋</span>
            <div class="sp-vol"><span style="font-size:0.9rem;opacity:0.6;cursor:pointer">🔊</span><div class="sp-vol-bar"><div class="sp-vol-fill"></div></div></div>
        </div>
    </div>
    <script>
        // Greeting
        const h = new Date().getHours();
        document.getElementById('greeting').textContent = h<12?'Bonjour':h<18?'Bon après-midi':'Bonsoir';
        // Quick picks
        const quicks = [{t:"Découverte de la semaine",img:"../../assets/images/media_44.jpg"},{t:"Release Radar",img:"../../assets/images/media_45.jpg"},{t:"Titres likés",img:"../../assets/images/media_43.jpg"},{t:"Gaming Mix",img:"../../assets/images/media_46.jpg"},{t:"Chill Hits",img:"../../assets/images/media_47.jpg"},{t:"Rap FR",img:"../../assets/images/media_48.jpg"}];
        const qg = document.getElementById('quick-grid');
        quicks.forEach(q => {
            const d = document.createElement('div'); d.className = 'sp-quick';
            d.innerHTML = `<div class="sq-img" style="background-image:url('${q.img}')"></div><span>${q.t}</span>`;
            d.onclick = () => playSong(q.t,'Spotify Mix');
            qg.appendChild(d);
        });
        // Cards
        const rows = {
            r1:[{t:"Daily Mix 1",p:"Daft Punk, Justice...",img:"../../assets/images/media_49.jpg"},{t:"Daily Mix 2",p:"Orelsan, PNL...",img:"../../assets/images/media_50.jpg"},{t:"Discover Weekly",p:"Fait pour toi",img:"../../assets/images/media_51.jpg"},{t:"Focus Flow",p:"Musique pour se concentrer",img:"../../assets/images/media_52.jpg"},{t:"Mood Booster",p:"Feel-good music",img:"../../assets/images/media_53.jpg"}],
            r2:[{t:"Starboy",p:"The Weeknd",img:"../../assets/images/media_54.jpg"},{t:"Random Access",p:"Daft Punk",img:"../../assets/images/media_55.jpg"},{t:"After Hours",p:"The Weeknd",img:"../../assets/images/media_56.jpg"},{t:"Renaissance",p:"Beyoncé",img:"../../assets/images/media_57.jpg"},{t:"Midnights",p:"Taylor Swift",img:"../../assets/images/media_58.jpg"}],
            r3:[{t:"Today's Top Hits",p:"50 titres les plus écoutés",img:"../../assets/images/media_49.jpg"},{t:"RapCaviar",p:"Le meilleur du rap",img:"../../assets/images/media_50.jpg"},{t:"Peaceful Piano",p:"Relaxation & focus",img:"../../assets/images/media_59.jpg"},{t:"Beast Mode",p:"Workout intensif",img:"../../assets/images/media_60.jpg"},{t:"Indie Pop",p:"Découvertes indie",img:"../../assets/images/media_61.jpg"}]
        };
        Object.keys(rows).forEach(id => {
            const row = document.getElementById(id);
            rows[id].forEach(c => {
                const d = document.createElement('div'); d.className='sp-card';
                d.innerHTML = `<div class="sp-card-img" style="background-image:url('${c.img}')"></div><h4>${c.t}</h4><p>${c.p}</p>`;
                d.onclick = () => playSong(c.t, c.p);
                row.appendChild(d);
            });
        });
        // Player
        let isPlaying = false;
        let progInterval;
        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('play-btn').textContent = isPlaying ? '⏸' : '▶';
            if(isPlaying) {
                progInterval = setInterval(() => {
                    const f = document.getElementById('prog-fill');
                    let w = parseFloat(f.style.width)||0;
                    if(w>=100){clearInterval(progInterval);isPlaying=false;document.getElementById('play-btn').textContent='▶';return;}
                    f.style.width = (w+0.3)+'%';
                },200);
            } else { clearInterval(progInterval); }
        }
        function playSong(title, artist) {
            document.getElementById('now-title').textContent = title;
            document.getElementById('now-artist').textContent = artist;
            document.getElementById('prog-fill').style.width = '0%';
            if(!isPlaying) togglePlay();
        }
    </script>
</body>
</html>
