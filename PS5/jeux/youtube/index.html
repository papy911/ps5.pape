<head>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0f0f0f; color:#fff; font-family:'Segoe UI',Roboto,sans-serif; }
        .yt-header { background:#0f0f0f; padding:10px 24px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:10; border-bottom:1px solid rgba(255,255,255,0.1); }
        .yt-logo { display:flex; align-items:center; gap:4px; font-size:1.3rem; font-weight:700; cursor:pointer; }
        .yt-logo .icon { background:#ff0000; color:white; padding:3px 6px; border-radius:5px; font-size:0.9rem; }
        .yt-search { display:flex; align-items:center; flex:0.5; }
        .yt-search input { flex:1; padding:8px 16px; background:#121212; border:1px solid #303030; border-radius:20px 0 0 20px; color:white; font-size:0.9rem; outline:none; }
        .yt-search input:focus { border-color:#1c62b9; }
        .yt-search button { padding:8px 20px; background:#222; border:1px solid #303030; border-left:none; border-radius:0 20px 20px 0; color:white; cursor:pointer; }
        .yt-icons { display:flex; gap:18px; align-items:center; }
        .yt-icons span { font-size:1.2rem; cursor:pointer; opacity:0.8; transition:0.2s; }
        .yt-icons span:hover { opacity:1; }
        .yt-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#ff0000,#cc0000); display:flex; align-items:center; justify-content:center; font-size:0.8rem; cursor:pointer; }
        .main { display:flex; }
        .sidebar { width:240px; padding:12px; flex-shrink:0; border-right:1px solid rgba(255,255,255,0.05); }
        .sidebar-item { display:flex; align-items:center; gap:18px; padding:10px 12px; border-radius:10px; cursor:pointer; font-size:0.85rem; color:rgba(255,255,255,0.8); transition:0.2s; }
        .sidebar-item:hover { background:rgba(255,255,255,0.1); }
        .sidebar-item.active { background:rgba(255,255,255,0.1); font-weight:600; color:white; }
        .sidebar-item .ico { font-size:1.1rem; width:24px; text-align:center; }
        .sidebar-divider { height:1px; background:rgba(255,255,255,0.1); margin:10px 0; }
        .content { flex:1; padding:20px 24px; }
        .chips { display:flex; gap:8px; margin-bottom:20px; overflow-x:auto; scrollbar-width:none; padding-bottom:5px; }
        .chips::-webkit-scrollbar { display:none; }
        .chip { padding:6px 14px; background:rgba(255,255,255,0.12); border-radius:8px; font-size:0.8rem; white-space:nowrap; cursor:pointer; transition:0.2s; border:none; color:white; }
        .chip:hover { background:rgba(255,255,255,0.2); }
        .chip.active { background:#fff; color:#000; font-weight:600; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
        .video-card { cursor:pointer; transition:0.2s; }
        .video-card:hover { transform:translateY(-2px); }
        .thumb { width:100%; aspect-ratio:16/9; border-radius:12px; background-size:cover; background-position:center; position:relative; overflow:hidden; }
        .thumb .duration { position:absolute; bottom:6px; right:6px; background:rgba(0,0,0,0.8); padding:2px 6px; border-radius:4px; font-size:0.7rem; font-weight:600; }
        .video-info { display:flex; gap:10px; margin-top:10px; }
        .channel-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#666,#999); flex-shrink:0; }
        .video-info h3 { font-size:0.9rem; font-weight:500; line-height:1.3; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .video-meta { font-size:0.75rem; color:rgba(255,255,255,0.5); }
        /* Video player */
        .player-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; flex-direction:column; align-items:center; justify-content:center; }
        .player-modal.active { display:flex; }
        .player-video { width:85%; max-width:1000px; aspect-ratio:16/9; background:#000; border-radius:12px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .player-video .big-play { font-size:4rem; opacity:0.8; transition:0.3s; }
        .player-video .big-play:hover { opacity:1; transform:scale(1.1); }
        .player-info { width:85%; max-width:1000px; margin-top:15px; }
        .player-info h2 { font-size:1.2rem; margin-bottom:5px; }
        .player-info p { font-size:0.8rem; color:rgba(255,255,255,0.5); }
        .player-close { position:fixed; top:15px; right:20px; font-size:1.5rem; cursor:pointer; z-index:101; }
    </style>
</head>

            d.onclick = () => openPlayer(v.t, v.ch, v.views, v.ago);
            grid.appendChild(d);
        });
        let isPlaying = false;
        function openPlayer(t,ch,views,ago) {
            document.getElementById('p-title').textContent = t;
            document.getElementById('p-meta').textContent = `${ch} Â· ${views} vues Â· il y a ${ago}`;
            document.getElementById('player-modal').classList.add('active');
            isPlaying = false;
            document.getElementById('big-play').textContent = 'â–¶';
        }
        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); isPlaying=false; }
        function togglePlay() { isPlaying=!isPlaying; document.getElementById('big-play').textContent = isPlaying?'â¸':'â–¶'; }
        document.addEventListener('keydown', e => { if(e.key==='Escape') closePlayer(); });
        document.querySelectorAll('.chip').forEach(c => c.onclick = function() {
            document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
            this.classList.add('active');
        });
