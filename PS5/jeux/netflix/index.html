<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - PlaySphere</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#141414; color:#fff; font-family:'Segoe UI',Roboto,sans-serif; overflow-x:hidden; }
        .hero { position:relative; height:70vh; background:linear-gradient(to right,rgba(0,0,0,0.9) 0%,rgba(0,0,0,0.3) 50%,transparent 100%),url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=1920') center/cover; display:flex; align-items:flex-end; padding:60px; }
        .hero-content { max-width:500px; }
        .hero-content h1 { font-size:3rem; margin-bottom:12px; text-shadow:0 2px 20px rgba(0,0,0,0.8); }
        .hero-content p { font-size:0.95rem; opacity:0.85; line-height:1.6; margin-bottom:20px; }
        .hero-btns { display:flex; gap:12px; }
        .btn-play { background:#fff; color:#000; border:none; padding:10px 28px; border-radius:6px; font-size:1rem; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; transition:0.2s; }
        .btn-play:hover { background:#e0e0e0; }
        .btn-info { background:rgba(109,109,110,0.7); color:#fff; border:none; padding:10px 28px; border-radius:6px; font-size:1rem; font-weight:600; cursor:pointer; transition:0.2s; }
        .btn-info:hover { background:rgba(109,109,110,0.9); }
        .section { padding:20px 60px; }
        .section h2 { font-size:1.3rem; margin-bottom:15px; font-weight:600; }
        .row { display:flex; gap:12px; overflow-x:auto; padding-bottom:15px; scrollbar-width:none; }
        .row::-webkit-scrollbar { display:none; }
        .card { flex-shrink:0; width:220px; height:130px; border-radius:6px; background-size:cover; background-position:center; cursor:pointer; transition:transform 0.3s, box-shadow 0.3s; position:relative; overflow:hidden; }
        .card:hover { transform:scale(1.08); z-index:2; box-shadow:0 10px 30px rgba(0,0,0,0.8); }
        .card-overlay { position:absolute; bottom:0; left:0; right:0; padding:8px 10px; background:linear-gradient(transparent,rgba(0,0,0,0.9)); opacity:0; transition:0.3s; }
        .card:hover .card-overlay { opacity:1; }
        .card-overlay span { font-size:0.75rem; font-weight:600; }
        .top-bar { position:fixed; top:0; left:0; right:0; z-index:10; padding:15px 60px; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(rgba(0,0,0,0.9),transparent); transition:background 0.3s; }
        .logo { font-size:1.8rem; font-weight:900; color:#e50914; letter-spacing:-1px; }
        .nav-links { display:flex; gap:20px; }
        .nav-links a { color:rgba(255,255,255,0.7); text-decoration:none; font-size:0.85rem; transition:0.2s; }
        .nav-links a:hover { color:#fff; }
        /* Video player modal */
        .player-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; flex-direction:column; }
        .player-modal.active { display:flex; }
        .player-box { width:80%; max-width:900px; aspect-ratio:16/9; background:#000; border-radius:10px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
        .player-box .fake-video { width:100%; height:100%; background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); display:flex; align-items:center; justify-content:center; }
        .player-box .play-icon { font-size:4rem; cursor:pointer; opacity:0.8; transition:0.3s; }
        .player-box .play-icon:hover { opacity:1; transform:scale(1.1); }
        .player-title { margin-top:15px; font-size:1.2rem; font-weight:600; }
        .player-close { position:absolute; top:15px; right:20px; font-size:1.5rem; cursor:pointer; z-index:101; opacity:0.7; }
        .player-close:hover { opacity:1; }
        .progress-bar { width:80%; max-width:900px; height:4px; background:rgba(255,255,255,0.2); border-radius:4px; margin-top:12px; cursor:pointer; }
        .progress-fill { width:35%; height:100%; background:#e50914; border-radius:4px; transition:width 0.3s; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div style="display:flex;align-items:center;gap:30px;">
            <div class="logo">NETFLIX</div>
            <div class="nav-links">
                <a href="#">Accueil</a>
                <a href="#">Séries</a>
                <a href="#">Films</a>
                <a href="#">Nouveautés</a>
                <a href="#">Ma liste</a>
            </div>
        </div>
        <div style="display:flex;align-items:center;gap:15px;">
            <span style="cursor:pointer">🔍</span>
            <span style="cursor:pointer">🔔</span>
            <div style="width:30px;height:30px;border-radius:4px;background:linear-gradient(135deg,#e50914,#b20710);display:flex;align-items:center;justify-content:center;font-size:0.8rem;cursor:pointer;">J</div>
        </div>
    </div>

    <div class="hero">
        <div class="hero-content">
            <h1>Stranger Things</h1>
            <p>Quand un jeune garçon disparaît, une petite ville découvre une affaire mystérieuse, des expériences secrètes et une fille extraordinaire.</p>
            <div class="hero-btns">
                <button class="btn-play" onclick="openPlayer('Stranger Things - S4E01')">▶ Lecture</button>
                <button class="btn-info" onclick="openPlayer('Stranger Things - Bande Annonce')">ℹ Plus d'infos</button>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>Tendances actuelles</h2>
        <div class="row" id="trending"></div>
    </div>
    <div class="section">
        <h2>Séries populaires</h2>
        <div class="row" id="series"></div>
    </div>
    <div class="section">
        <h2>Films d'action</h2>
        <div class="row" id="action"></div>
    </div>
    <div class="section">
        <h2>Documentaires</h2>
        <div class="row" id="docs"></div>
    </div>

    <div class="player-modal" id="player-modal">
        <span class="player-close" onclick="closePlayer()">✕</span>
        <div class="player-box"><div class="fake-video"><span class="play-icon" id="play-toggle">▶</span></div></div>
        <div class="player-title" id="player-title">Titre</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <script>
        const movies = {
            trending: [
                {t:"Squid Game 2",img:"https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=400"},
                {t:"The Witcher",img:"https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=400"},
                {t:"Dark",img:"https://images.unsplash.com/photo-1478760329108-5c3ed9d495a0?w=400"},
                {t:"Money Heist",img:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400"},
                {t:"Arcane",img:"https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?w=400"},
                {t:"Wednesday",img:"https://images.unsplash.com/photo-1509281373149-e957c6296406?w=400"},
                {t:"Peaky Blinders",img:"https://images.unsplash.com/photo-1485846234645-a62644f84728?w=400"},
            ],
            series: [
                {t:"Breaking Bad",img:"https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=400"},
                {t:"Narcos",img:"https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400"},
                {t:"Ozark",img:"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=400"},
                {t:"The Crown",img:"https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=400"},
                {t:"Lupin",img:"https://images.unsplash.com/photo-1514306191717-452ec28c7814?w=400"},
                {t:"Black Mirror",img:"https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=400"},
            ],
            action: [
                {t:"Extraction",img:"https://images.unsplash.com/photo-1535016120720-40c646be5580?w=400"},
                {t:"Red Notice",img:"https://images.unsplash.com/photo-1509347528160-9a9e33742cdb?w=400"},
                {t:"The Gray Man",img:"https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400"},
                {t:"6 Underground",img:"https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400"},
                {t:"Triple Frontière",img:"https://images.unsplash.com/photo-1470229722913-7c0e2dbbafd3?w=400"},
                {t:"Old Guard",img:"https://images.unsplash.com/photo-1533488765986-dfa2a9939acd?w=400"},
            ],
            docs: [
                {t:"Our Planet",img:"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=400"},
                {t:"The Social Dilemma",img:"https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400"},
                {t:"Seaspiracy",img:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=400"},
                {t:"Abstract",img:"https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400"},
                {t:"Chef's Table",img:"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400"},
            ]
        };
        Object.keys(movies).forEach(cat => {
            const row = document.getElementById(cat);
            movies[cat].forEach(m => {
                const d = document.createElement('div');
                d.className = 'card';
                d.style.backgroundImage = `url('${m.img}')`;
                d.innerHTML = `<div class="card-overlay"><span>${m.t}</span></div>`;
                d.onclick = () => openPlayer(m.t);
                row.appendChild(d);
            });
        });

        let playing = false;
        let progressInterval;
        function openPlayer(title) {
            document.getElementById('player-title').textContent = title;
            document.getElementById('player-modal').classList.add('active');
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('play-toggle').textContent = '▶';
            playing = false;
        }
        function closePlayer() {
            document.getElementById('player-modal').classList.remove('active');
            clearInterval(progressInterval);
            playing = false;
        }
        document.getElementById('play-toggle').onclick = function() {
            playing = !playing;
            this.textContent = playing ? '⏸' : '▶';
            if (playing) {
                progressInterval = setInterval(() => {
                    const fill = document.getElementById('progress-fill');
                    let w = parseFloat(fill.style.width) || 0;
                    if (w >= 100) { clearInterval(progressInterval); playing = false; document.getElementById('play-toggle').textContent = '▶'; return; }
                    fill.style.width = (w + 0.5) + '%';
                }, 200);
            } else { clearInterval(progressInterval); }
        };
        document.addEventListener('keydown', e => { if(e.key==='Escape') closePlayer(); });
    </script>
</body>
</html>
